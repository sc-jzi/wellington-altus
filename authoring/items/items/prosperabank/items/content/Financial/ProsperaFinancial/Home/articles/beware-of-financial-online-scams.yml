        <div>
        <div>
        <p><span>3. Planning for the Unexpected</span></p>
        <p>Depending on the specific terms of the RESP contract between the subscriber(s) and the financial institution, RESPs do not automatically continue in the event of a subscriber&rsquo;s death. To help protect your RESP planning, you may consider naming joint subscribers to the RESP and include specific RESP instructions in your estate planning documents. Without appropriate planning, a RESP may be collapsed, subject to taxation, and/or be required to repay government grants upon the death of a subscriber.</p>
        <h2><span>Canada Education Savings Grant</span></h2>
        <p>One of the most compelling benefits of using a RESP is the Canada Education Savings Grant (CESG). The CESG is a federal government program that can provide a grant equal to 20% of the first $2,500 contributed to a RESP each year, per child, up to and including the year the beneficiary turns 17. This results in a maximum annual grant of $500<span style="line-height: 0;">1</span>, with a lifetime CESG limit of $7,200 per beneficiary.</p>
        <p>Additional CESG amounts may be available to families with lower &ldquo;adjusted family net income&rdquo;, providing enhanced government support to help make post-secondary education more accessible.</p>
        <p><span>Canada Learning Bond</span></p>
        <p>In addition to the CESG, low-income families may also benefit from the Canada Learning Bond (CLB), which provides further encouragement to save for post-secondary education. The CLB offers up to $2,000 per eligible beneficiary, comprised of an initial $500 payment in the first year the child qualifies, followed by annual payments of $100 for each additional year of eligibility until the year the child turns 15. Unlike the CESG, there is no requirement to make contributions to the RESP to benefit from the CLB. Employment and Social Development Canada (ESDC) also provide a one-time $25 deposit alongside the initial CLB payment to help offset the costs associated with opening a RESP.</p>
        <h2><span>Withdrawing from Your RESP</span></h2>
        <p>When it comes time to withdraw funds from a RESP to help pay for education, many subscribers wonder whether there is a &ldquo;best&rdquo; approach to maximizing the RESP value while minimizing tax implications.</p>
        <p>Depending on the nature of the withdrawal, amounts received may be considered taxable or non-taxable. While a detailed discussion of RESP withdrawal strategies is beyond the scope of this introductory article, we explore timing and tax considerations in greater depth in our companion piece, &ldquo;Maximizing Your RESP: Withdraw Wisely<span style="line-height: 0;">2</span>.&rdquo;</p>
        </div>
        </div>
        </div>
        </div>
        <div>
        <div>
        <div>
        <div>
        <h3><span>Final Thoughts</span></h3>
        <p>RESPs are among the most effective and efficient tools available to help families save for post-secondary education in Canada. Whether you are planning for a first child or coordinating education savings for multiple children, understanding the rules and available government incentives can help you maximize the impact of every dollar.</p>
        <p><span>To learn more about how a RESP can fit into your broader financial plan, speak with your Wellington-Altus advisor about building a strategy to support your family&rsquo;s educational goals.</span></p>
        </div>
        </div>
        </div>
        </div>
        <div>
        <div>
        <div>
        <div>
        <p><span style="line-height: 0;">1</span>&nbsp;Where a year of RESP contributions are missed, or the RESP is opened later in the child&rsquo;s life, there may be an opportunity to make &ldquo;catch up&rdquo; contributions to recover some prior year CESG amounts within certain limits.</p>
        <p><span style="line-height: 0;">2</span>&nbsp;<span style="text-decoration: underline;">Maximizing Your RESP: Withdraw Wisely &ndash; Wellington-Altus</span></p>
        </div>
        </div>
        </div>
