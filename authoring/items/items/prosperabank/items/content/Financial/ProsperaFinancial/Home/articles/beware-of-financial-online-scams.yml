        <div>
        <div>
        <div>
        <div>
        <p><span style="text-decoration: underline;">QUICK FACTS:</span></p>
        <ul>
            <li style="background: transparent; border: 0px; list-style-type: disc; list-style-image: initial;"><span>Lifetime Contribution Limit:&nbsp;</span>$50,000 lifetime contribution per beneficiary across all RESPs</li>
            <li style="background: transparent; border: 0px; list-style-type: disc; list-style-image: initial;"><span>Annual Contribution Limit:&nbsp;</span>None; account can be front-loaded, but will reduce available CESG</li>
            <li style="background: transparent; border: 0px; list-style-type: disc; list-style-image: initial;"><span>Lifetime CESG Limit:&nbsp;</span>$7,200 per beneficiary</li>
            <li style="background: transparent; border: 0px; list-style-type: disc; list-style-image: initial;"><span>Maximum CLB:&nbsp;</span>$2,000 per eligible beneficiary</li>
            <li style="background: transparent; border: 0px; list-style-type: disc; list-style-image: initial;">Contributions are not tax-deductible, but investments grow tax-deferred</li>
        </ul>
        </div>
