        <div>
        <h2><span>What is a RESP?</span></h2>
        <p>A RESP is a tax-deferred registered account that is intended to be used as a long-term savings tool to help Canadians save for higher education, either for themselves or their children.</p>
        <h2><span>Setting Up a RESP</span></h2>
        <p>While opening a RESP is straightforward, there are a few key items you will want to consider:</p>
        <h3><span>1. Key Roles</span></h3>
        <p>There are two key roles to understand when establishing a RESP: the subscriber and the beneficiary.</p>
        <p>The subscriber is the individual who opens and manages the RESP, most commonly a parent or guardian, though a grandparent or other relative may also serve in this role. In some cases, a RESP may be established with joint subscribers, such as when both parents are named on the plan.</p>
        <p>The beneficiary is the individual for whom the RESP is intended and who will use the funds for post-secondary education. Depending on the type of RESP, including individual, family, or group plans, there may be one or multiple beneficiaries associated with a single RESP account.</p>
        <p><span>2. Choosing the Right Type of RESP</span></p>
        <p>RESPs generally come in three formats:</p>
        </div>
        </div>
        </div>
        </div>
